<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Manager">
<meta name="theme-color" content="#0F172A">
<title>PT Manager AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#38BDF8;--acc2:#0EA5E9;--acc-soft:#E0F5FF;--acc-softer:#F0FAFF;--acc-text:#0C4A6E;
  --navy:#0F172A;--navy2:#1E293B;
  --surface:#fff;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --border:rgba(148,163,184,0.2);--border2:rgba(148,163,184,0.35);
  --r:14px;--shadow:0 2px 12px rgba(15,23,42,0.07);
  --sb:env(safe-area-inset-bottom,0px);
}
.t-sky   {--acc:#38BDF8;--acc2:#0EA5E9;--acc-soft:#E0F5FF;--acc-softer:#F0FAFF;--acc-text:#0C4A6E}
.t-pink  {--acc:#F472B6;--acc2:#EC4899;--acc-soft:#FDE7F3;--acc-softer:#FFF0F8;--acc-text:#831843}
.t-lime  {--acc:#84CC16;--acc2:#65A30D;--acc-soft:#ECFCCB;--acc-softer:#F7FFED;--acc-text:#2D5016}
.t-purple{--acc:#A78BFA;--acc2:#8B5CF6;--acc-soft:#EDE9FE;--acc-softer:#F5F3FF;--acc-text:#3B0764}
.t-peach {--acc:#FB923C;--acc2:#F97316;--acc-soft:#FFEDD5;--acc-softer:#FFF7ED;--acc-text:#7C2D12}
.t-mint  {--acc:#2DD4BF;--acc2:#14B8A6;--acc-soft:#CCFBF1;--acc-softer:#F0FFFE;--acc-text:#134E4A}

html,body{height:100%;overflow:hidden;font-family:'Pretendard',sans-serif;background:var(--surface2);color:var(--text)}

#loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
#loading p{font-size:13px;color:rgba(255,255,255,0.4)}
.spin{width:26px;height:26px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#login{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:998}
.l-logo{font-size:50px;margin-bottom:6px}
.l-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.l-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;text-align:center;line-height:1.6}
.l-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;width:100%;max-width:340px}
.l-mode{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px;text-align:center}
.l-inp{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.07);color:#fff;font-size:14px;font-family:'Pretendard',sans-serif;margin-bottom:10px}
.l-inp::placeholder{color:rgba(255,255,255,0.3)}
.l-inp:focus{outline:none;border-color:var(--acc)}
.l-btn{width:100%;padding:13px;border-radius:10px;background:var(--acc);color:var(--navy);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Pretendard',sans-serif}
.l-btn:active{transform:scale(0.98)}
.l-err{font-size:12px;color:#F87171;text-align:center;min-height:16px;margin-top:8px}
.l-toggle{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;margin-top:12px;cursor:pointer}
.l-toggle span{color:var(--acc);font-weight:600}

/* 초대 링크로 접속시 역할 자동 선택 안내 */
.l-trainer-badge{background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--acc);text-align:center;margin-bottom:10px;display:none}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

.hd{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 12px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.hd-member{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 14px;flex-shrink:0}
.hd-mname{font-size:18px;font-weight:700;color:var(--acc)}
.hd-msub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px}
.xp-row{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.4);margin:10px 0 3px}
.xp-track{background:rgba(255,255,255,0.12);border-radius:10px;height:6px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:10px;transition:width .5s}
.chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,0.7);cursor:pointer;font-weight:500;white-space:nowrap}

.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px calc(68px + var(--sb));background:var(--surface2)}

.tabs{background:var(--surface);border-top:0.5px solid var(--border2);display:flex;padding-bottom:var(--sb);flex-shrink:0;z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 4px 6px}
.tab i{font-size:22px;color:var(--text3)}
.tab span{font-size:9px;color:var(--text3);font-weight:500}
.tab.on i,.tab.on span{color:var(--acc2)}

@media(min-width:768px){
  #app{flex-direction:row}
  .hd,.hd-member{display:none}
  .sb{width:216px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
  .sb-logo{padding:22px 14px 13px;border-bottom:1px solid rgba(255,255,255,0.07)}
  .sb-logo h1{font-size:14px;font-weight:700;color:#fff}
  .sb-logo p{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px}
  .sb-nav{flex:1;padding:8px;overflow-y:auto}
  .sb-sec{font-size:9px;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:.9px;padding:10px 8px 3px}
  .sb-it{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:1px;transition:all .15s}
  .sb-it:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
  .sb-it.on{background:rgba(255,255,255,0.1);color:var(--acc)}
  .sb-it i{font-size:15px;width:17px;text-align:center}
  .sb-bot{padding:10px;border-top:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;gap:6px}
  .sb-theme{padding:8px 10px 0}
  .sb-theme p{font-size:9px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--surface);border-bottom:0.5px solid var(--border2);padding:0 20px;height:52px;display:flex;align-items:center;flex-shrink:0}
  .topbar h2{font-size:14px;font-weight:600;flex:1}
  .tabs{display:none}
  .content{padding:16px 20px 20px}
}
@media(max-width:767px){
  .sb{display:none}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:none}
}

.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px}
.card-acc{background:var(--acc-softer);border-color:rgba(0,0,0,0.05)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.met{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.met-l{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.met-v{font-size:22px;font-weight:700;color:var(--acc2)}
.met-s{font-size:10px;color:var(--text3);margin-top:1px}
.st{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.row:last-child{border-bottom:none}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:var(--acc-soft);color:var(--acc-text)}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.tag-a{background:var(--acc-soft);color:var(--acc-text)}
.tag-g{background:#DCFCE7;color:#14532D}
.tag-y{background:#FEF9C3;color:#713F12}
.tag-gr{background:var(--surface3);color:var(--text3)}
.wp{background:#FFF1F2;border:0.5px solid rgba(244,63,94,0.2);color:#9F1239;font-size:10px;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;margin-right:4px;margin-bottom:4px;font-weight:500}
.ex{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border-radius:8px;margin:3px 0;border:0.5px solid var(--border)}
.ex span:first-child{font-size:12px;font-weight:500;flex:1}
.ex span:last-of-type{font-size:11px;color:var(--text3)}
.pb{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px}
.lv{display:inline-flex;align-items:center;gap:3px;background:var(--acc-soft);color:var(--acc-text);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.xpp{background:var(--acc-soft);color:var(--acc-text);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;display:inline-block;margin-top:5px}
.fg{margin-bottom:11px}
.fl{font-size:10px;color:var(--text3);margin-bottom:3px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:9px;background:var(--surface);color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);font-family:'Pretendard',sans-serif;font-weight:500;transition:all .15s}
.btn:active{transform:scale(0.97)}
.btn-a{background:var(--acc);color:var(--acc-text);border-color:var(--acc);font-weight:700}
.btn-w{width:100%;margin-top:6px}
.btn-d{background:#FEE2E2;color:#7F1D1D;border-color:#FEE2E2}
.si{padding:10px 0;border-bottom:0.5px solid var(--border)}
.si:last-child{border-bottom:none}
.ir{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border)}
.ir:last-child{border-bottom:none}
.nc{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.np{border-left:3px solid #EAB308;background:#FFFBEB;border-radius:0 12px 12px 0}
.sc{background:var(--navy2);border-radius:14px;padding:14px 16px;color:#fff;margin-bottom:12px}
.sb2{font-size:30px;font-weight:700;color:var(--acc);line-height:1}
.dots{display:flex;gap:5px;margin-top:9px}
.dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;border:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.dot.on{background:var(--acc);color:var(--navy);border-color:var(--acc)}
.dot.td{background:rgba(255,255,255,0.15);color:#fff;border:2px solid var(--acc);animation:dp 1.5s infinite}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,0.4)}50%{box-shadow:0 0 0 5px transparent}}
.mi{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.mi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.mi.hard::before{background:#F43F5E}
.mi.mid::before{background:var(--acc)}
.mi.done{opacity:0.5;background:var(--surface3)}
.mi.done::before{background:var(--border2)}
.mi:active{transform:scale(0.98)}
.hg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.hc{background:var(--surface);border:0.5px solid var(--border2);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.hc.acc{background:var(--acc-softer);border-color:rgba(0,0,0,0.04)}
.hc:active{transform:scale(0.97)}
.hc-i{font-size:22px;margin-bottom:7px}
.hc-t{font-size:13px;font-weight:700;margin-bottom:2px}
.hc-s{font-size:11px;color:var(--text3)}
.ab{background:var(--acc-softer);border:0.5px solid var(--border2);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.ab-t{font-size:10px;font-weight:700;color:var(--acc2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:4px}
.ae{font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.ae:last-child{border-bottom:none}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sw{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:12px;cursor:pointer;border:2px solid var(--border2);background:var(--surface);transition:all .15s}
.sw.on{border-color:var(--acc);background:var(--acc-softer)}
.sw:active{transform:scale(0.95)}
.sc2{width:30px;height:30px;border-radius:50%}
.sn{font-size:11px;font-weight:600;color:var(--text2)}
.es{text-align:center;padding:36px 20px;color:var(--text3)}
.es i{font-size:40px;margin-bottom:12px;display:block;opacity:0.4}
.es p{font-size:13px;line-height:1.6}
::-webkit-scrollbar{display:none}
.pe{animation:pi .2s ease}
@keyframes pi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:48px">⚡</div>
  <div class="spin"></div>
  <p>PT Manager AI</p>
</div>

<div id="login">
  <div class="l-logo">⚡</div>
  <div class="l-title">PT Manager AI</div>
  <div class="l-sub" id="l-sub">트레이너와 회원을 위한<br>AI 수업 관리 시스템</div>
  <div class="l-box">
    <div class="l-trainer-badge" id="l-badge">🔗 트레이너 초대 링크로 접속했어요</div>
    <div class="l-mode" id="l-mode">로그인</div>
    <input class="l-inp" type="email" id="l-email" placeholder="이메일">
    <input class="l-inp" type="password" id="l-pw" placeholder="비밀번호">
    <input class="l-inp" type="text" id="l-name" placeholder="이름" style="display:none">
    <select id="l-role" style="display:none;padding:12px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.07);color:#fff;font-size:14px;margin-bottom:10px;width:100%;font-family:'Pretendard',sans-serif">
      <option value="trainer">트레이너</option>
      <option value="member">회원</option>
    </select>
    <button class="l-btn" onclick="doAuth()" id="l-btn">로그인</button>
    <div class="l-err" id="l-err"></div>
    <div class="l-toggle" onclick="toggleMode()">계정이 없으신가요? <span id="l-tog">회원가입</span></div>
  </div>
</div>

<div id="app" class="t-sky" style="display:none">
  <div class="sb" id="sb">
    <div class="sb-logo">
      <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 9px;margin-bottom:8px">
        <span style="font-size:11px;color:var(--acc);font-weight:600">⚡ PT Manager AI</span>
      </div>
      <h1 id="sb-title">로딩 중</h1>
      <p id="sb-sub"></p>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div id="sb-theme" style="display:none" class="sb-theme">
      <p>테마</p>
      <div style="display:flex;gap:5px;flex-wrap:wrap" id="sb-sw"></div>
    </div>
    <div class="sb-bot">
      <div class="chip" style="justify-content:center" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i><span id="rb-txt">회원 뷰로 전환</span></div>
      <div class="chip" style="justify-content:center;color:rgba(255,100,100,0.8)" onclick="doLogout()"><i class="ti ti-logout"></i>로그아웃</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar"><h2 id="tb-title">대시보드</h2></div>

    <div id="hd-t" style="display:none">
      <div class="hd">
        <div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">⚡ PT Manager AI</div>
          <div style="font-size:16px;font-weight:700;color:#fff" id="hd-page">대시보드</div>
        </div>
        <div style="display:flex;gap:6px">
          <div class="chip" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i>회원뷰</div>
          <div class="chip" onclick="doLogout()" style="color:rgba(255,100,100,0.8)"><i class="ti ti-logout"></i></div>
        </div>
      </div>
    </div>

    <div id="hd-m" style="display:none">
      <div class="hd-member">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:2px">안녕하세요 👋</div>
            <div class="hd-mname" id="hd-mname">회원님</div>
            <div class="hd-msub" id="hd-msub"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="lv" id="hd-lv"><i class="ti ti-star"></i>Lv.1</div>
            <div class="chip" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i>트레이너</div>
          </div>
        </div>
        <div class="xp-row"><span>경험치</span><span id="hd-xp">0 XP</span></div>
        <div class="xp-track"><div class="xp-fill" id="hd-xpb" style="width:0%"></div></div>
      </div>
    </div>

    <div class="content" id="content"></div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<script>
const SB = supabase.createClient(
  'https://vljmjxkqnzxsawdstdcl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsam1qeGtxbnp4c2F3ZHN0ZGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTkyNjAsImV4cCI6MjA5NDM3NTI2MH0.tP40JvDzeenxeWcKyLgZCSkzkHPyot3RyEJZsCj4Zio'
);

// URL에서 트레이너 ID 추출
const URL_PARAMS = new URLSearchParams(window.location.search);
const TRAINER_ID_FROM_URL = URL_PARAMS.get('trainer');

// 초대 링크로 접속한 경우 배지 표시
if (TRAINER_ID_FROM_URL) {

async function init(){

    else showLogin();

}

function showLogin(){
  document.getElementById('loading').style.display='none';

}

function showApp(){
  document.getElementById('loading').style.display='none';
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  setTheme(prof?.theme||'sky');
  role=prof?.role||'trainer';

function toggleMode(){
  isSignup=!isSignup;
  document.getElementById('l-mode').textContent=isSignup?'회원가입':'로그인';
  document.getElementById('l-btn').textContent=isSignup?'가입하기':'로그인';
  document.getElementById('l-tog').textContent=isSignup?'로그인':'회원가입';
  document.getElementById('l-name').style.display=isSignup?'block':'none';
  // 초대 링크로 왔으면 역할 선택 숨기기 (자동으로 회원)
  if(!TRAINER_ID_FROM_URL){
    document.getElementById('l-role').style.display=isSignup?'block':'none';
  }
}

async function doAuth(){
  const email=document.getElementById('l-email').value.trim();
  const pw=document.getElementById('l-pw').value.trim();
  const err=document.getElementById('l-err');
  const btn=document.getElementById('l-btn');
  err.textContent='';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요';return;}
  btn.textContent='처리 중...';btn.disabled=true;

  try{
    if(isSignup){
      const name=document.getElementById('l-name').value.trim();
      if(!name){err.textContent='이름을 입력하세요';btn.textContent='가입하기';btn.disabled=false;return;}

      // 초대 링크로 접속한 경우 자동으로 회원, 아니면 선택값 사용
      const r = TRAINER_ID_FROM_URL ? 'member' : document.getElementById('l-role').value;

      const {data,error}=await SB.auth.signUp({email,password:pw});
      if(error) throw error;

      // users 테이블에 저장 — 초대 링크가 있으면 trainer_id 자동 연결
      await SB.from('users').insert({
        id: data.user.id,
        name,
        role: r,
        theme: 'sky',
        trainer_id: r==='member' ? TRAINER_ID_FROM_URL : null,
        invite_token: r==='trainer' ? Math.random().toString(36).slice(2,10) : null,
      });

      // 회원이면 members 테이블에도 추가
      if(r==='member'){
        await SB.from('members').insert({user_id: data.user.id});
      }

      user=data.user;
      await loadProf();
      showApp();
    }else{
      const {data,error}=await SB.auth.signInWithPassword({email,password:pw});
      if(error) throw error;
      user=data.user;
      await loadProf();
      showApp();
    }
  }catch(e){
    err.textContent=isSignup?e.message:'이메일 또는 비밀번호가 틀렸어요';
    btn.textContent=isSignup?'가입하기':'로그인';
    btn.disabled=false;
  }
}

async function doLogout(){await SB.auth.signOut();location.reload();}

async function loadProf(){
  const {data}=await SB.from('users').select('*').eq('id',user.id).single();
  prof=data;
  if(data?.role==='member'){
    const {data:mp}=await SB.from('members').select('*').eq('user_id',user.id).single();
    mprof=mp;
  }
}

async function loadMembers(){
  // 트레이너는 본인 회원만 조회
  const {data}=await SB.from('members')
    .select('*,user:users!members_user_id_fkey(name,theme,invite_token)')
    .eq('user.trainer_id', prof?.id)
    .order('created_at');
  members=data||[];
}

async function loadSessions(mid=null){
  let q=SB.from('sessions').select('*').order('session_date',{ascending:false}).limit(20);
  if(mid) q=q.eq('member_id',mid);
  else q=q.eq('trainer_id',prof?.id);
  const {data}=await q;
  sessions=data||[];
}

async function loadInbody(mid=null){
  let q=SB.from('inbody_records').select('*').order('measured_at',{ascending:false}).limit(20);
  if(mid) q=q.eq('member_id',mid);
  const {data}=await q;
  inbodys=data||[];
}

async function loadNotices(){

    .order('is_pinned',{ascending:false})
    .order('created_at',{ascending:false});
  notices=data||[];
}

async function loadMissions(){

  const {data}=await SB.from('mission_progress').select('*').eq('member_id',mprof.id);
  missions=data||[];

async function go(id){
  page=id; renderNav();
  if(chart){chart.destroy();chart=null;}
  const c=document.getElementById('content');
  c.innerHTML=`<div style="display:flex;justify-content:center;padding:48px"><div class="spin" style="border-top-color:var(--acc2)"></div></div>`;
  c.scrollTop=0;

  if(['dashboard','members'].includes(id)) await loadMembers();
  if(['session','dashboard','homework'].includes(id)) await loadSessions();
  if(id==='inbody') await loadInbody();
  if(['notice','mn'].includes(id)) await loadNotices();
  if(id==='mm') await loadMissions();
  if(id==='mj') await loadSessions(mprof?.id);
  if(id==='mi2') await loadInbody(mprof?.id);
  if(id==='mhw') await loadSessions(mprof?.id);
  if(id==='mh'){await loadSessions(mprof?.id);await loadInbody(mprof?.id);await loadNotices();}

  const d=document.createElement('div');
  d.className='pe';
  d.innerHTML=html(id);
  c.innerHTML='';c.appendChild(d);
  setTimeout(()=>{if(id==='inbody'||id==='mi2') drawChart(id);},100);
}
