<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Manager">
<meta name="theme-color" content="#0F172A">
<title>PT Manager AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#38BDF8;--acc2:#0EA5E9;--acc3:#0284C7;
  --acc-soft:#E0F5FF;--acc-softer:#F0FAFF;--acc-text:#0C4A6E;
  --navy:#0F172A;--navy2:#1E293B;--navy3:#334155;
  --surface:#fff;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --border:rgba(148,163,184,0.18);--border2:rgba(148,163,184,0.32);
  --r:14px;--shadow:0 2px 12px rgba(15,23,42,0.07);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
.t-sky{--acc:#38BDF8;--acc2:#0EA5E9;--acc-soft:#E0F5FF;--acc-softer:#F0FAFF;--acc-text:#0C4A6E}
.t-pink{--acc:#F472B6;--acc2:#EC4899;--acc-soft:#FDE7F3;--acc-softer:#FFF0F8;--acc-text:#831843}
.t-lime{--acc:#84CC16;--acc2:#65A30D;--acc-soft:#ECFCCB;--acc-softer:#F7FFED;--acc-text:#2D5016}
.t-purple{--acc:#A78BFA;--acc2:#8B5CF6;--acc-soft:#EDE9FE;--acc-softer:#F5F3FF;--acc-text:#3B0764}
.t-peach{--acc:#FB923C;--acc2:#F97316;--acc-soft:#FFEDD5;--acc-softer:#FFF7ED;--acc-text:#7C2D12}
.t-mint{--acc:#2DD4BF;--acc2:#14B8A6;--acc-soft:#CCFBF1;--acc-softer:#F0FFFE;--acc-text:#134E4A}

html,body{height:100%;overflow:hidden;font-family:'Pretendard',sans-serif;background:var(--surface2);color:var(--text)}

/* ── 앱 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── 상단 헤더 (모바일) ── */
.mob-header{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 14px;flex-shrink:0}
.trainer-header{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.trainer-header h1{font-size:16px;font-weight:700;color:#fff}

/* ── 콘텐츠 영역 ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px calc(70px + var(--safe-bottom));background:var(--surface2)}

/* ── 하단 탭바 ── */
.tabbar{background:var(--surface);border-top:0.5px solid var(--border2);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;position:relative;z-index:10}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 4px 6px;transition:all .15s}
.tab-item i{font-size:22px;color:var(--text3);transition:color .15s}
.tab-item span{font-size:9px;color:var(--text3);font-weight:500;transition:color .15s}
.tab-item.active i,.tab-item.active span{color:var(--acc2)}
.tab-dot{position:relative}
.tab-dot::after{content:'';position:absolute;top:0;right:-1px;width:7px;height:7px;background:#F43F5E;border-radius:50%;border:1.5px solid var(--surface)}

/* ── 트레이너 사이드바 (태블릿) ── */
@media(min-width:768px){
  #app{flex-direction:row}
  .mob-header{display:none}
  .trainer-header{display:none}
  .sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
  .sidebar-logo{padding:24px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
  .sidebar-logo h1{font-size:15px;font-weight:700;color:#fff}
  .sidebar-logo p{font-size:11px;color:rgba(255,255,255,0.38);margin-top:2px}
  .sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
  .s-section{font-size:9px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.9px;padding:10px 8px 3px;margin-top:2px}
  .s-item{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.5);transition:all .15s;margin-bottom:1px}
  .s-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
  .s-item.active{background:rgba(255,255,255,0.1);color:var(--acc)}
  .s-item i{font-size:15px;width:17px;text-align:center}
  .s-badge{margin-left:auto;background:var(--acc);color:var(--navy);font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
  .sidebar-bottom{padding:10px 10px 16px;border-top:1px solid rgba(255,255,255,0.07)}
  .role-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);font-weight:500}
  .role-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
  .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--surface);border-bottom:0.5px solid var(--border2);padding:0 20px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .topbar h2{font-size:14px;font-weight:600;flex:1}
  .tabbar{display:none}
  .content{padding:16px 20px 20px}
}
@media(max-width:767px){
  .sidebar{display:none}
  .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:none}
}

/* ── 공통 컴포넌트 ── */
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px}
.card-acc{background:var(--acc-softer);border-color:rgba(0,0,0,0.05)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.metric-value{font-size:22px;font-weight:700;color:var(--acc2)}
.metric-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.mc{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.mc:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.mname{font-size:13px;font-weight:600}
.msub{font-size:11px;color:var(--text3);margin-top:1px}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.tag-acc{background:var(--acc-soft);color:var(--acc-text)}
.tag-g{background:#DCFCE7;color:#14532D}
.tag-y{background:#FEF9C3;color:#713F12}
.tag-r{background:#FEE2E2;color:#7F1D1D}
.tag-gr{background:var(--surface3);color:var(--text3)}
.warn-pill{background:#FFF1F2;border:0.5px solid rgba(244,63,94,0.2);color:#9F1239;font-size:10px;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;margin-right:4px;margin-bottom:4px;font-weight:500}
.ex-row{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border-radius:8px;margin:3px 0;border:0.5px solid var(--border)}
.ex-row span:first-child{font-size:12px;font-weight:500;flex:1}
.ex-row span:last-of-type{font-size:11px;color:var(--text3)}
.divider{height:0.5px;background:var(--border);margin:10px 0}
.progress-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px}
.xp-bar-wrap{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:4px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px}
.level-pill{display:inline-flex;align-items:center;gap:3px;background:var(--acc-soft);color:var(--acc-text);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.xp-pill{background:var(--acc-soft);color:var(--acc-text);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;display:inline-block;margin-top:5px}
.form-group{margin-bottom:11px}
.form-label{font-size:10px;color:var(--text3);margin-bottom:3px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
input,select,textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:9px;background:var(--surface);color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);font-family:'Pretendard',sans-serif;font-weight:500;transition:all .15s;-webkit-appearance:none}
.btn:active{transform:scale(0.97)}
.btn-acc{background:var(--acc);color:var(--acc-text);border-color:var(--acc);font-weight:700}
.btn-full{width:100%;margin-top:6px}
.session-item{padding:10px 0;border-bottom:0.5px solid var(--border)}
.session-item:last-child{border-bottom:none}
.sticky-warn{background:#FFF1F2;border:0.5px solid rgba(244,63,94,0.2);border-left:3px solid #F43F5E;border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:12px}
.inbody-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border)}
.inbody-row:last-child{border-bottom:none}
.pos{color:#059669;font-weight:600}
.neg{color:#DC2626;font-weight:600}
.notice-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.notice-pin{border-left:3px solid #EAB308;background:#FFFBEB;border-radius:0 12px 12px 0}
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:40px;margin-bottom:4px}
.bar{flex:1;border-radius:3px 3px 0 0}
.bar.filled{background:var(--acc)}
.bar.empty{background:var(--surface3);border:0.5px solid var(--border)}
.streak-card{background:var(--navy2);border-radius:14px;padding:14px 16px;color:#fff;margin-bottom:12px}
.streak-big{font-size:30px;font-weight:700;color:var(--acc);line-height:1}
.streak-dots{display:flex;gap:5px;margin-top:9px}
.s-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;border:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.s-dot.done{background:var(--acc);color:var(--navy);border-color:var(--acc)}
.s-dot.today{background:rgba(255,255,255,0.15);color:#fff;border:2px solid var(--acc);animation:dp 1.5s infinite}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,0.4)}50%{box-shadow:0 0 0 5px transparent}}
.mission-item{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.mission-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.mission-item.hard::before{background:#F43F5E}
.mission-item.mid::before{background:var(--acc)}
.mission-item.done{opacity:0.5;background:var(--surface3)}
.mission-item.done::before{background:var(--border2)}
.mission-item:active{transform:scale(0.98)}
.mi-title{font-size:13px;font-weight:600;margin-bottom:2px}
.mi-desc{font-size:11px;color:var(--text3)}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.hm-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.hm-card.acc{background:var(--acc-softer);border-color:rgba(0,0,0,0.04)}
.hm-card:active{transform:scale(0.97)}
.hm-icon{font-size:22px;margin-bottom:7px}
.hm-title{font-size:13px;font-weight:700;margin-bottom:2px}
.hm-sub{font-size:11px;color:var(--text3)}
.check-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-item input{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0;margin-top:1px}
.ai-block{background:var(--acc-softer);border:0.5px solid var(--border2);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.ai-block-title{font-size:10px;font-weight:700;color:var(--acc2);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:4px}
.ai-ex{font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.ai-ex:last-child{border-bottom:none}
.ai-ex span:last-child{font-size:10px;color:var(--text3);background:var(--surface);padding:1px 6px;border-radius:10px;border:0.5px solid var(--border);white-space:nowrap}

/* 테마 스와치 */
.swatch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.swatch-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:12px;cursor:pointer;border:2px solid var(--border2);background:var(--surface);transition:all .15s}
.swatch-item.active{border-color:var(--acc);background:var(--acc-softer)}
.swatch-item:active{transform:scale(0.95)}
.swatch-circle{width:30px;height:30px;border-radius:50%}
.swatch-name{font-size:11px;font-weight:600;color:var(--text2)}

/* 회원 헤더 */
.member-header{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 16px;flex-shrink:0}
.mh-greeting{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:2px}
.mh-name{font-size:18px;font-weight:700;color:var(--acc)}
.mh-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.xp-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:3px;margin-top:10px}
.xp-track{background:rgba(255,255,255,0.12);border-radius:10px;height:6px;overflow:hidden}
.xp-fill-w{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:10px}

/* 역할 전환 버튼 (모바일 상단) */
.role-toggle-mob{position:absolute;right:14px;top:max(44px,env(safe-area-inset-top,44px));display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,0.8);cursor:pointer;font-weight:500}

/* 페이지 애니메이션 */
.page-enter{animation:pIn .2s ease}
@keyframes pIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 스크롤바 숨김 */
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app" class="t-sky">

  <!-- 사이드바 (태블릿) -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 9px;margin-bottom:8px"><span style="font-size:11px;color:var(--acc);font-weight:600">⚡ PT Manager AI</span></div>
      <h1 id="sb-title">트레이너 모드</h1>
      <p id="sb-sub">Kim Trainer님</p>
    </div>
    <nav class="sidebar-nav" id="sb-nav"></nav>
    <div id="sb-theme-wrap" style="display:none;padding:10px 10px 8px;border-top:1px solid rgba(255,255,255,0.07)">
      <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px">테마</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap" id="sb-swatches"></div>
    </div>
    <div class="sidebar-bottom">
      <button class="role-btn" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i><span id="role-btn-txt">회원 뷰로 전환</span></button>
    </div>
  </div>

  <!-- 메인 영역 -->
  <div class="main-area">
    <!-- 태블릿 탑바 -->
    <div class="topbar" id="topbar">
      <h2 id="topbar-title">대시보드</h2>
      <div id="topbar-actions"></div>
    </div>

    <!-- 회원 모바일 헤더 -->
    <div id="member-header-mob" style="display:none;position:relative">
      <div class="member-header" id="member-header-inner">
        <div class="mh-greeting">안녕하세요 👋</div>
        <div class="mh-name">김민지님</div>
        <div class="mh-sub">근비대 · 7주차 진행중</div>
        <div class="xp-labels"><span>경험치</span><span id="xp-label-mob">820 / 1000 XP</span></div>
        <div class="xp-track"><div class="xp-fill-w" id="xp-bar-mob" style="width:82%"></div></div>
      </div>
      <div class="role-toggle-mob" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i>트레이너 뷰</div>
    </div>

    <!-- 트레이너 모바일 헤더 -->
    <div id="trainer-header-mob" style="position:relative">
      <div class="trainer-header">
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:1px">⚡ PT Manager AI</div>
          <h1 style="font-size:16px;font-weight:700;color:#fff" id="trainer-page-title-mob">대시보드</h1>
        </div>
        <div id="trainer-topbar-actions-mob"></div>
      </div>
      <div class="role-toggle-mob" style="top:max(46px,env(safe-area-inset-top,46px))" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i>회원 뷰</div>
    </div>

    <!-- 콘텐츠 -->
    <div class="content" id="content"></div>

    <!-- 하단 탭바 (모바일) -->
    <div class="tabbar" id="tabbar"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── 전역 상태 ──
let role = 'trainer';
let curPage = 'dashboard';
let curTheme = 'sky';
let chartInst = null;

const themes = [
  {id:'sky',name:'스카이',color:'#38BDF8',cls:'t-sky'},
  {id:'pink',name:'핑크',color:'#F472B6',cls:'t-pink'},
  {id:'lime',name:'라임',color:'#84CC16',cls:'t-lime'},
  {id:'purple',name:'퍼플',color:'#A78BFA',cls:'t-purple'},
  {id:'peach',name:'피치',color:'#FB923C',cls:'t-peach'},
  {id:'mint',name:'민트',color:'#2DD4BF',cls:'t-mint'},
];

const members = [

// ── 테마 적용 ──
function applyTheme(id) {
  curTheme = id;
  const app = document.getElementById('app');
  themes.forEach(t => app.classList.remove(t.cls));
  app.classList.add(themes.find(x => x.id === id).cls);
  renderSbSwatches();
}

function renderSbSwatches() {
  const el = document.getElementById('sb-swatches');
  if (!el) return;
  el.innerHTML = themes.map(t =>
    `<div onclick="applyTheme('${t.id}')" style="width:22px;height:22px;border-radius:50%;background:${t.color};cursor:pointer;border:2px solid ${t.id===curTheme?'#fff':'transparent'};transition:all .15s"></div>`
  ).join('');
}

// ── 네비게이션 렌더링 ──
function renderNav() {
  const isMobile = window.innerWidth < 768;

  // 사이드바
  const sbNav = document.getElementById('sb-nav');
  const nav = role === 'trainer' ? trainerNav : memberNav;
  sbNav.innerHTML = nav.map(it => {
    if (it.sec) return `<div class="s-section">${it.sec}</div>`;
    const badge = it.badge ? `<span class="s-badge">${it.badge}</span>` : '';
    return `<div class="s-item ${it.id===curPage?'active':''}" onclick="showPage('${it.id}')"><i class="ti ${it.icon}"></i>${it.label}${badge}</div>`;
  }).join('');

  document.getElementById('sb-title').textContent = role === 'trainer' ? '트레이너 모드' : '회원 모드';
  document.getElementById('sb-sub').textContent = role === 'trainer' ? 'Kim Trainer님' : '김민지님';
  document.getElementById('role-btn-txt').textContent = role === 'trainer' ? '회원 뷰로 전환' : '트레이너 뷰로 전환';
  document.getElementById('sb-theme-wrap').style.display = role === 'member' ? 'block' : 'none';
  renderSbSwatches();

  // 탭바 (모바일)
  const tabs = role === 'trainer' ? trainerTabs : memberTabs;
  const tabbar = document.getElementById('tabbar');
  tabbar.innerHTML = tabs.map(t =>
    `<div class="tab-item ${t.id===curPage?'active':''} ${t.dot?'tab-dot':''}" onclick="showPage('${t.id}')"><i class="ti ${t.icon}"></i><span>${t.label}</span></div>`
  ).join('');

  // 모바일 헤더 전환
  document.getElementById('member-header-mob').style.display = (role==='member'&&isMobile) ? 'block' : 'none';
  document.getElementById('trainer-header-mob').style.display = (role==='trainer'&&isMobile) ? 'block' : 'none';
  if (isMobile && role==='trainer') {
    document.getElementById('trainer-page-title-mob').textContent = pageTitles[curPage] || '';
  }

  // 탑바 액션
  const ta = document.getElementById('topbar-actions');
  const tam = document.getElementById('trainer-topbar-actions-mob');
  const title = document.getElementById('topbar-title');
  if (title) title.textContent = pageTitles[curPage] || '';
  let actions = '';
  if (role==='trainer') {
    if (curPage==='dashboard') actions = `<button class="btn" style="font-size:11px;padding:6px 10px" onclick="showPage('session')"><i class="ti ti-plus"></i>수업 일지</button><button class="btn btn-acc" style="font-size:11px;padding:6px 10px;margin-left:6px" onclick="showPage('ai-plan')"><i class="ti ti-robot"></i>AI 수업안</button>`;
    else if (curPage==='m-home'||curPage==='m-missions') actions = `<div class="level-pill"><i class="ti ti-star"></i>Lv.5</div>`;
  } else {
    actions = `<div class="level-pill"><i class="ti ti-star"></i>Lv.5</div>`;
  }
  if (ta) ta.innerHTML = actions;
  if (tam) tam.innerHTML = '';
}

// ── 페이지 이동 ──
function showPage(id) {
  curPage = id;
  renderNav();
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const c = document.getElementById('content');
  c.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'page-enter';
  div.innerHTML = getHTML(id);
  c.appendChild(div);
  c.scrollTop = 0;
  setTimeout(() => postRender(id), 100);
}

function postRender(id) {
  if (id === 'inbody' || id === 'm-inbody') drawChart(id);
}

// ── 역할 전환 ──
function toggleRole() {
  role = role === 'trainer' ? 'member' : 'trainer';
  showPage(role === 'member' ? 'm-home' : 'dashboard');
}

  if (role === 'trainer') {
    if (id==='dashboard') return tDash();

    if (id==='session') return tSession();
    if (id==='ai-plan') return tAI();
    if (id==='inbody') return tInbody();
    if (id==='homework') return tHomework();
    if (id==='notice') return tNotice();
  } else {
    if (id==='m-home') return mHome();
    if (id==='m-journal') return mJournal();
    if (id==='m-inbody') return mInbody();
    if (id==='m-missions') return mMissions();
    if (id==='m-homework') return mHomework();
    if (id==='m-notice') return mNotice();
    if (id==='m-settings') return mSettings();
  }
  return '';
}

function addEx() {
  const list = document.getElementById('ex-list');
  if (!list) return;
  const names = ['런지','힙 쓰러스트','케이블 로우','숄더프레스','덤벨 컬'];
  const row = document.createElement('div');
  row.className = 'ex-row';
  row.innerHTML = `<span>${names[Math.floor(Math.random()*names.length)]}</span><span>-- · -- 회 · -- 세트</span><i class="ti ti-trash" style="font-size:13px;color:var(--text3);cursor:pointer;margin-left:6px" onclick="this.closest('.ex-row').remove()"></i>`;
  list.appendChild(row);
}

function doSave() {
  const btn = event.target.closest('button');
  btn.innerHTML = '<i class="ti ti-loader"></i> 저장 중...';
  btn.disabled = true;
  setTimeout(() => showPage('ai-plan'), 1200);
}

function genPlan() {
  const btn = document.getElementById('gen-btn');
  if (!btn) return;
  btn.innerHTML = '<i class="ti ti-loader"></i> 분석 중...';
  btn.disabled = true;
  setTimeout(() => {
    btn.innerHTML = '<i class="ti ti-sparkles"></i> AI 수업안 자동 생성';
    btn.disabled = false;
    const r = document.getElementById('plan-result');
    if (!r) return;
    r.innerHTML = `
      <div class="sticky-warn" style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:#9F1239;margin-bottom:3px"><i class="ti ti-shield"></i> 안전 고려 반영</div>
        <span class="warn-pill">점프 제외</span><span class="warn-pill">무릎 부하 최소화</span>
      </div>
      <div class="card">
        <div class="sec-title"><i class="ti ti-list"></i>생성된 수업안</div>
        ${[['ti-wave-sine','준비운동 10분',['폼롤러 허벅지·종아리','힙 서클 10회','바디웨이트 스쿼트 15회×2']],
           ['ti-barbell','메인 35분',['백스쿼트 65kg · 8회·4세트 (↑5kg)','레그프레스 110kg · 10회·3세트','루마니안 데드리프트 50kg · 10회·3세트']],
           ['ti-flame','보강 10분',['힙 어브덕션 밴드 · 15회×3','싱글레그 브리지 · 12회×3']],
           ['ti-heart','쿨다운 5분',['하체 스트레칭 각 30초']]].map(([ic,title,exs])=>
          `<div class="ai-block"><div class="ai-block-title"><i class="ti ${ic}"></i>${title}</div>${exs.map(e=>`<div class="ai-ex"><span>${e}</span></div>`).join('')}</div>`).join('')}

          <button class="btn" style="flex:1"><i class="ti ti-edit"></i>수정</button>
          <button class="btn btn-acc" style="flex:2" onclick="doConfirm(this)"><i class="ti ti-check"></i>확정 후 공유</button>
        </div>
      </div>`;
    r.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 1800);
}

function doConfirm(btn) {
  btn.innerHTML = '<i class="ti ti-check"></i> 확정 완료!';
  btn.disabled = true;
  setTimeout(() => showPage('homework'), 1000);
}

function completeMission(id) {
  const m = missions.find(x => x.id === id);
  if (m && !m.done) {
    m.done = true;
    members[0].xp = Math.min(members[0].xp + m.xp, members[0].xpMax);
    const xpLabel = document.getElementById('xp-label-mob');
    const xpBar = document.getElementById('xp-bar-mob');
    if (xpLabel) xpLabel.textContent = `${members[0].xp} / ${members[0].xpMax} XP`;
    if (xpBar) xpBar.style.width = Math.round(members[0].xp / members[0].xpMax * 100) + '%';
  }
  showPage('m-missions');
}

function doMarkMission() {
  completeMission(4);
  showPage('m-missions');
}

function drawChart(id) {
  const cid = id === 'm-inbody' ? 'member-inbody-chart' : 'inbody-chart';
  const canvas = document.getElementById(cid);
  if (!canvas) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  chartInst = new Chart(canvas, {
    type:'line',
    data:{
      labels:['3월','4월','5월초','5월 14일'],
      datasets:[
        {label:'체지방률(%)',data:[24.4,23.5,22.8,22.3],borderColor:'#F43F5E',backgroundColor:'rgba(244,63,94,0.06)',borderWidth:2,tension:.4,pointRadius:3,pointBackgroundColor:'#F43F5E',yAxisID:'y'},
        {label:'골격근량(kg)',data:[23.3,23.6,23.9,24.1],borderColor:'#0EA5E9',backgroundColor:'rgba(14,165,233,0.06)',borderWidth:2,tension:.4,pointRadius:3,pointBackgroundColor:'#0EA5E9',yAxisID:'y1'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{size:10},color:'#94A3B8',boxWidth:10}}},
      scales:{
        x:{grid:{color:'rgba(148,163,184,0.1)'},ticks:{font:{size:10},color:'#94A3B8'}},
        y:{position:'left',grid:{color:'rgba(148,163,184,0.08)'},ticks:{font:{size:9},color:'#F43F5E'},title:{display:true,text:'체지방%',color:'#F43F5E',font:{size:9}}},
        y1:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:9},color:'#0EA5E9'},title:{display:true,text:'근육kg',color:'#0EA5E9',font:{size:9}}}
      }
    }
  });
}
