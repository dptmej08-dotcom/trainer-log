<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Manager">
<meta name="theme-color" content="#0F172A">
<title>PT Manager AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#38BDF8;--acc2:#0EA5E9;--acc-soft:#E0F5FF;--acc-softer:#F0FAFF;--acc-text:#0C4A6E;
  --navy:#0F172A;--navy2:#1E293B;
  --surface:#fff;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --border:rgba(148,163,184,0.18);--border2:rgba(148,163,184,0.32);
  --r:14px;--shadow:0 2px 12px rgba(15,23,42,0.07);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
.t-sky{--acc:#38BDF8;--acc2:#0EA5E9;--acc-soft:#E0F5FF;--acc-softer:#F0FAFF;--acc-text:#0C4A6E}
.t-pink{--acc:#F472B6;--acc2:#EC4899;--acc-soft:#FDE7F3;--acc-softer:#FFF0F8;--acc-text:#831843}
.t-lime{--acc:#84CC16;--acc2:#65A30D;--acc-soft:#ECFCCB;--acc-softer:#F7FFED;--acc-text:#2D5016}
.t-purple{--acc:#A78BFA;--acc2:#8B5CF6;--acc-soft:#EDE9FE;--acc-softer:#F5F3FF;--acc-text:#3B0764}
.t-peach{--acc:#FB923C;--acc2:#F97316;--acc-soft:#FFEDD5;--acc-softer:#FFF7ED;--acc-text:#7C2D12}
.t-mint{--acc:#2DD4BF;--acc2:#14B8A6;--acc-soft:#CCFBF1;--acc-softer:#F0FFFE;--acc-text:#134E4A}
html,body{height:100%;overflow:hidden;font-family:'Pretendard',sans-serif;background:var(--surface2);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* 로딩 */
#loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#loading-screen .logo{font-size:48px}
#loading-screen p{font-size:14px;color:rgba(255,255,255,0.5)}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 로그인 */
#login-screen{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:998}
.login-logo{font-size:52px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.login-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:32px;text-align:center;line-height:1.6}
.login-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;width:100%;max-width:340px}
.login-input{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.07);color:#fff;font-size:14px;font-family:'Pretendard',sans-serif;margin-bottom:10px}
.login-input::placeholder{color:rgba(255,255,255,0.3)}
.login-input:focus{outline:none;border-color:var(--acc)}
.login-btn{width:100%;padding:13px;border-radius:10px;background:var(--acc);color:var(--navy);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Pretendard',sans-serif;margin-bottom:8px}
.login-btn:active{transform:scale(0.98)}
.login-err{font-size:12px;color:#F87171;text-align:center;min-height:18px;margin-top:4px}
.login-toggle{font-size:12px;color:rgba(255,255,255,0.45);text-align:center;margin-top:12px;cursor:pointer}
.login-toggle span{color:var(--acc);font-weight:600}

/* 헤더 */
.mob-trainer-header{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 12px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.mob-member-header{background:var(--navy);padding:max(44px,env(safe-area-inset-top,44px)) 16px 14px;flex-shrink:0}
.mh-name{font-size:18px;font-weight:700;color:var(--acc)}
.mh-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.xp-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:3px;margin-top:10px}
.xp-track{background:rgba(255,255,255,0.12);border-radius:10px;height:6px;overflow:hidden}
.xp-bar-inner{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:10px;transition:width .5s ease}

/* 콘텐츠 */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px calc(70px + var(--safe-bottom));background:var(--surface2)}

/* 탭바 */
.tabbar{background:var(--surface);border-top:0.5px solid var(--border2);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;position:relative;z-index:10}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 4px 6px}
.tab-item i{font-size:22px;color:var(--text3)}
.tab-item span{font-size:9px;color:var(--text3);font-weight:500}
.tab-item.active i,.tab-item.active span{color:var(--acc2)}
.tab-dot{position:relative}
.tab-dot::after{content:'';position:absolute;top:0;right:-1px;width:7px;height:7px;background:#F43F5E;border-radius:50%;border:1.5px solid var(--surface)}

/* 사이드바 (태블릿) */
@media(min-width:768px){
  #app{flex-direction:row}
  .mob-trainer-header,.mob-member-header{display:none}
  .sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
  .sb-logo{padding:24px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
  .sb-logo h1{font-size:15px;font-weight:700;color:#fff}
  .sb-logo p{font-size:11px;color:rgba(255,255,255,0.38);margin-top:2px}
  .sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
  .sb-sec{font-size:9px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:0.9px;padding:10px 8px 3px}
  .sb-item{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:1px;transition:all .15s}
  .sb-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
  .sb-item.active{background:rgba(255,255,255,0.1);color:var(--acc)}
  .sb-item i{font-size:15px;width:17px;text-align:center}
  .sb-badge{margin-left:auto;background:var(--acc);color:var(--navy);font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
  .sb-bottom{padding:10px 10px 16px;border-top:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;gap:6px}
  .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--surface);border-bottom:0.5px solid var(--border2);padding:0 20px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .topbar h2{font-size:14px;font-weight:600;flex:1}
  .tabbar{display:none}
  .content{padding:16px 20px 20px}
}
@media(max-width:767px){
  .sidebar{display:none}
  .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:none}
}

/* 공통 컴포넌트 */
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px}
.card-acc{background:var(--acc-softer);border-color:rgba(0,0,0,0.05)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.metric-value{font-size:22px;font-weight:700;color:var(--acc2)}
.metric-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.mc{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.mc:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.mname{font-size:13px;font-weight:600}
.msub{font-size:11px;color:var(--text3);margin-top:1px}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.tag-acc{background:var(--acc-soft);color:var(--acc-text)}
.tag-g{background:#DCFCE7;color:#14532D}
.tag-y{background:#FEF9C3;color:#713F12}
.tag-r{background:#FEE2E2;color:#7F1D1D}
.tag-gr{background:var(--surface3);color:var(--text3)}
.warn-pill{background:#FFF1F2;border:0.5px solid rgba(244,63,94,0.2);color:#9F1239;font-size:10px;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;margin-right:4px;margin-bottom:4px;font-weight:500}
.ex-row{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border-radius:8px;margin:3px 0;border:0.5px solid var(--border)}
.ex-row span:first-child{font-size:12px;font-weight:500;flex:1}
.ex-row span:last-of-type{font-size:11px;color:var(--text3)}
.divider{height:0.5px;background:var(--border);margin:10px 0}
.progress-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px}
.level-pill{display:inline-flex;align-items:center;gap:3px;background:var(--acc-soft);color:var(--acc-text);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.xp-pill{background:var(--acc-soft);color:var(--acc-text);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;display:inline-block;margin-top:5px}
.form-group{margin-bottom:11px}
.form-label{font-size:10px;color:var(--text3);margin-bottom:3px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
input,select,textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:9px;background:var(--surface);color:var(--text);font-size:13px;font-family:'Pretendard',sans-serif;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);font-family:'Pretendard',sans-serif;font-weight:500;transition:all .15s}
.btn:active{transform:scale(0.97)}
.btn-acc{background:var(--acc);color:var(--acc-text);border-color:var(--acc);font-weight:700}
.btn-full{width:100%;margin-top:6px}
.btn-danger{background:#FEE2E2;color:#7F1D1D;border-color:#FEE2E2}
.session-item{padding:10px 0;border-bottom:0.5px solid var(--border)}
.session-item:last-child{border-bottom:none}
.sticky-warn{background:#FFF1F2;border:0.5px solid rgba(244,63,94,0.2);border-left:3px solid #F43F5E;border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:12px}
.inbody-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border)}
.inbody-row:last-child{border-bottom:none}
.pos{color:#059669;font-weight:600}.neg{color:#DC2626;font-weight:600}
.notice-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.notice-pin{border-left:3px solid #EAB308;background:#FFFBEB;border-radius:0 12px 12px 0}
.streak-card{background:var(--navy2);border-radius:14px;padding:14px 16px;color:#fff;margin-bottom:12px}
.streak-big{font-size:30px;font-weight:700;color:var(--acc);line-height:1}
.streak-dots{display:flex;gap:5px;margin-top:9px}
.s-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;border:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.s-dot.done{background:var(--acc);color:var(--navy);border-color:var(--acc)}
.s-dot.today{background:rgba(255,255,255,0.15);color:#fff;border:2px solid var(--acc);animation:dp 1.5s infinite}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,0.4)}50%{box-shadow:0 0 0 5px transparent}}
.mission-item{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.mission-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.mission-item.hard::before{background:#F43F5E}
.mission-item.mid::before{background:var(--acc)}
.mission-item.done{opacity:0.5;background:var(--surface3)}
.mission-item.done::before{background:var(--border2)}
.mission-item:active{transform:scale(0.98)}
.mi-title{font-size:13px;font-weight:600;margin-bottom:2px}
.mi-desc{font-size:11px;color:var(--text3)}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.hm-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.hm-card.acc{background:var(--acc-softer);border-color:rgba(0,0,0,0.04)}
.hm-card:active{transform:scale(0.97)}
.hm-icon{font-size:22px;margin-bottom:7px}
.hm-title{font-size:13px;font-weight:700;margin-bottom:2px}
.hm-sub{font-size:11px;color:var(--text3)}
.check-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.check-item:last-child{border-bottom:none}
.check-item input{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0;margin-top:1px}
.ai-block{background:var(--acc-softer);border:0.5px solid var(--border2);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.ai-block-title{font-size:10px;font-weight:700;color:var(--acc2);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:4px}
.ai-ex{font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.ai-ex:last-child{border-bottom:none}
.swatch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.swatch-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:12px;cursor:pointer;border:2px solid var(--border2);background:var(--surface);transition:all .15s}
.swatch-item.active{border-color:var(--acc);background:var(--acc-softer)}
.swatch-circle{width:30px;height:30px;border-radius:50%}
.swatch-name{font-size:11px;font-weight:600;color:var(--text2)}
.empty-state{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-state i{font-size:40px;margin-bottom:12px;display:block;opacity:0.4}
.empty-state p{font-size:13px;line-height:1.6}
.role-chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,0.75);cursor:pointer;font-weight:500;white-space:nowrap}
::-webkit-scrollbar{display:none}
.page-enter{animation:pIn .2s ease}
@keyframes pIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">⚡</div>
  <div class="spinner"></div>
  <p>PT Manager AI</p>
</div>

<div id="login-screen">
  <div class="login-logo">⚡</div>
  <div class="login-title">PT Manager AI</div>
  <div class="login-sub">트레이너와 회원을 위한<br>AI 수업 관리 시스템</div>
  <div class="login-card">
    <div id="login-mode-label" style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px;text-align:center">로그인</div>
    <input class="login-input" type="email" id="login-email" placeholder="이메일">
    <input class="login-input" type="password" id="login-pw" placeholder="비밀번호">
    <input class="login-input" type="text" id="signup-name" placeholder="이름" style="display:none">
    <select id="signup-role" style="display:none;padding:12px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.07);color:#fff;font-size:14px;margin-bottom:10px;width:100%;font-family:'Pretendard',sans-serif">
      <option value="trainer">트레이너</option>
      <option value="member">회원</option>
    </select>
    <button class="login-btn" onclick="doAuth()" id="auth-btn">로그인</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-toggle" onclick="toggleAuthMode()">계정이 없으신가요? <span id="toggle-txt">회원가입</span></div>
  </div>
</div>

<div id="app" class="t-sky" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 9px;margin-bottom:8px">
        <span style="font-size:11px;color:var(--acc);font-weight:600">⚡ PT Manager AI</span>
      </div>
      <h1 id="sb-title">로딩 중...</h1>
      <p id="sb-sub"></p>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div id="sb-theme-wrap" style="display:none;padding:8px 10px 0">
      <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px">테마</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap" id="sb-swatches"></div>
    </div>
    <div class="sb-bottom">
      <button class="role-chip" style="justify-content:center" onclick="toggleRole()">
        <i class="ti ti-switch-horizontal"></i><span id="role-btn-txt">회원 뷰로 전환</span>
      </button>
      <button class="role-chip" style="justify-content:center;color:rgba(255,120,120,0.8)" onclick="doLogout()">
        <i class="ti ti-logout"></i>로그아웃
      </button>
    </div>
  </div>

  <div class="main-area">
    <div class="topbar" id="topbar">
      <h2 id="topbar-title">대시보드</h2>
      <div id="topbar-actions"></div>
    </div>

    <div id="member-mob-header" style="display:none">
      <div class="mob-member-header">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:2px">안녕하세요 👋</div>
            <div class="mh-name" id="m-header-name">회원님</div>
            <div class="mh-sub" id="m-header-sub"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="level-pill" id="m-level-pill"><i class="ti ti-star"></i>Lv.1</div>
            <div class="role-chip" onclick="toggleRole()"><i class="ti ti-switch-horizontal"></i>트레이너</div>
          </div>
        </div>
        <div class="xp-labels"><span>경험치</span><span id="m-xp-label">0 XP</span></div>
        <div class="xp-track"><div class="xp-bar-inner" id="m-xp-bar" style="width:0%"></div></div>
      </div>
    </div>

    <div id="trainer-mob-header" style="display:none">
      <div class="mob-trainer-header">
        <div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:1px">⚡ PT Manager AI</div>

async function initAuth() {

  if (session) {
    currentUser = session.user;
    await loadUserProfile();
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  applyTheme(userProfile?.theme || 'sky');
  role = userProfile?.role || 'trainer';
  showPage(role === 'member' ? 'm-home' : 'dashboard');
}

function toggleAuthMode() {
  isSignup = !isSignup;
  document.getElementById('login-mode-label').textContent = isSignup ? '회원가입' : '로그인';
  document.getElementById('auth-btn').textContent = isSignup ? '가입하기' : '로그인';
  document.getElementById('toggle-txt').textContent = isSignup ? '로그인' : '회원가입';
  document.getElementById('signup-name').style.display = isSignup ? 'block' : 'none';
  document.getElementById('signup-role').style.display = isSignup ? 'block' : 'none';
}

async function doAuth() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value.trim();
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('auth-btn');
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력하세요'; return; }
  btn.textContent = '처리 중...'; btn.disabled = true;

  if (isSignup) {
    const name = document.getElementById('signup-name').value.trim();
    const r    = document.getElementById('signup-role').value;
    if (!name) { errEl.textContent = '이름을 입력하세요'; btn.textContent='가입하기'; btn.disabled=false; return; }
    const { data, error } = await sb.auth.signUp({ email, password: pw });
    if (error) { errEl.textContent = error.message; btn.textContent='가입하기'; btn.disabled=false; return; }
    await sb.from('users').insert({
      id: data.user.id, name, role: r, theme: 'sky',
      invite_token: r==='member' ? name.replace(/\s/g,'')+'_'+Math.random().toString(36).slice(2,8) : null
    });
    if (r === 'member') await sb.from('members').insert({ user_id: data.user.id });
    currentUser = data.user;
    await loadUserProfile();
    showApp();
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) { errEl.textContent = '이메일 또는 비밀번호가 틀렸어요'; btn.textContent='로그인'; btn.disabled=false; return; }
    currentUser = data.user;
    await loadUserProfile();
    showApp();
  }
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadUserProfile() {
  const { data } = await sb.from('users').select('*').eq('id', currentUser.id).single();
  userProfile = data;
  if (data?.role === 'member') {
    const { data: mp } = await sb.from('members').select('*').eq('user_id', currentUser.id).single();
    memberProfile = mp;
  }
}

async function loadMembers() {
  const { data } = await sb.from('members')
    .select('*, user:users(name, theme, invite_token)')
    .order('created_at');
  memberList = data || [];
}

async function loadSessions(memberId = null) {
  let q = sb.from('sessions').select('*').order('session_date', { ascending: false });
  if (memberId) q = q.eq('member_id', memberId);
  const { data } = await q.limit(20);
  sessionList = data || [];
}

async function loadInbody(memberId = null) {
  let q = sb.from('inbody_records').select('*').order('measured_at', { ascending: false });
  if (memberId) q = q.eq('member_id', memberId);
  const { data } = await q.limit(20);
  inbodyList = data || [];
}

async function loadNotices() {

  c.scrollTop = 0;

  // 페이지별 데이터 로드
  if (['dashboard','members'].includes(id))         await loadMembers();
  if (['session','dashboard','homework'].includes(id)) await loadSessions();
  if (['inbody'].includes(id))                      await loadInbody();
  if (['notice','m-notice'].includes(id))           await loadNotices();
  if (id==='m-missions')                            await loadMissions();
  if (id==='m-journal')                             await loadSessions(memberProfile?.id);

  const div = document.createElement('div');
  div.className = 'page-enter';
  div.innerHTML = getPageHTML(id);
  c.innerHTML = '';
  c.appendChild(div);
  setTimeout(() => { if (id==='inbody'||id==='m-inbody') drawChart(id); }, 100);

      <button class="btn btn-acc btn-full" style="flex:2" onclick="saveSession(true)"><i class="ti ti-send"></i>저장 & 회원 공유</button>

async function saveSession(isShared) {
  const memberId = document.getElementById('sel-member')?.value;
  if (!memberId) { alert('회원을 선택해주세요'); return; }
  const exRows = document.querySelectorAll('#ex-list .ex-row');
  const exercises = Array.from(exRows).map(r=>({ name: r.querySelectorAll('span')[0]?.textContent, detail: r.querySelectorAll('span')[1]?.textContent }));
  const { error } = await sb.from('sessions').insert({
    member_id:     memberId,
    trainer_id:    currentUser.id,
    session_date:  document.getElementById('inp-date')?.value,
    condition:     document.getElementById('inp-condition')?.value,
    exercises,
    coaching_note: document.getElementById('inp-coaching')?.value||'',
    caution:       document.getElementById('inp-caution')?.value||'',
    homework:      document.getElementById('inp-homework')?.value||'',
    is_shared:     isShared,
  });
  if (error) { alert('저장 실패: '+error.message); return; }
  alert(isShared ? '저장 완료! 회원에게 공유됐어요 ✅' : '저장 완료!');
  showPage('session');
}

function genPlan() {
  const btn = document.getElementById('gen-btn');
  if (!btn) return;
  btn.innerHTML = '<i class="ti ti-loader"></i> 분석 중...'; btn.disabled = true;
  setTimeout(() => {
    btn.innerHTML = '<i class="ti ti-sparkles"></i> AI 수업안 자동 생성'; btn.disabled = false;
    const r = document.getElementById('plan-result');
    if (!r) return;
    const goal = document.getElementById('ai-goal')?.value;
    const week = document.getElementById('ai-week')?.value;
    r.innerHTML = `
      <div class="card">
        <div class="sec-title"><i class="ti ti-list"></i>${goal} ${week} 추천 수업안</div>
        ${[['ti-wave-sine','준비운동 10분',['폼롤러 전신 이완','동적 스트레칭 10회','바디웨이트 스쿼트 15회×2']],
           ['ti-barbell','메인 운동 35분',['메인 운동 A · 8회·4세트','메인 운동 B · 10회·3세트','메인 운동 C · 12회·3세트']],
           ['ti-flame','보강 운동 10분',['보강 A · 15회×3','보강 B · 12회×3']],
           ['ti-heart','쿨다운 5분',['전신 스트레칭 각 30초']]].map(([ic,title,exs])=>
          `<div class="ai-block"><div class="ai-block-title"><i class="ti ${ic}"></i>${title}</div>${exs.map(e=>`<div class="ai-ex"><span>${e}</span></div>`).join('')}</div>`).join('')}
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn" style="flex:1"><i class="ti ti-edit"></i>수정</button>
          <button class="btn btn-acc" style="flex:2" onclick="savePlan(this)"><i class="ti ti-check"></i>확정 & 저장</button>
        </div>
      </div>`;
    r.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 1800);
}

async function savePlan(btn) {
  const memberId = document.getElementById('ai-sel-member')?.value;
  if (!memberId) { alert('회원을 선택해주세요'); return; }
  btn.innerHTML = '<i class="ti ti-check"></i> 저장 완료!'; btn.disabled = true;
  await sb.from('ai_plans').insert({
    member_id: memberId, trainer_id: currentUser.id,
    plan_content: { note: '자동 생성' }, is_confirmed: true, confirmed_at: new Date().toISOString(),
  });
  setTimeout(() => showPage('homework'), 1000);
}

async function saveInbody() {

    member_id:    memberId,
    measured_at:  document.getElementById('inbody-date')?.value,
    weight:       parseFloat(document.getElementById('inbody-w')?.value)||null,
    body_fat_pct: parseFloat(document.getElementById('inbody-f')?.value)||null,
    muscle_mass:  parseFloat(document.getElementById('inbody-m')?.value)||null,
    bmi:          parseFloat(document.getElementById('inbody-b')?.value)||null,
  });
  if (error) { alert('저장 실패: '+error.message); return; }
  alert('인바디 저장 완료! ✅');
  showPage('inbody');
}

async function saveNotice() {
  const title = document.getElementById('notice-title')?.value?.trim();
  const body  = document.getElementById('notice-body')?.value?.trim();
  if (!title||!body) { alert('제목과 내용을 입력해주세요'); return; }
  const { error } = await sb.from('notices').insert({
    trainer_id: currentUser.id, title, body,
    is_pinned: document.getElementById('notice-pin')?.checked||false,
  });
  if (error) { alert('저장 실패: '+error.message); return; }
  alert('공지 게시 완료! ✅');
  showPage('notice');
}

    <div class="streak-dots">${['월','화','수','목','금','토','일'].map((d,i)=>`<div class="s-dot ${i<(memberProfile?.streak||0)%7?'done':i===Math.min((memberProfile?.streak||0)%7,6)?'today':''}">${d}</div>`).join('')}</div>

  <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">진행 중인 미션</div>
  ${MISSIONS_DEF.filter(m=>!doneKeys.has(m.key)).map(m=>`
    <div class="mission-item ${m.type}" onclick="completeMission('${m.key}',${m.xp})">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:22px;width:32px;text-align:center">${m.icon}</div>
        <div style="flex:1"><div class="mi-title">${m.title}</div><div class="mi-desc">${m.desc}</div><span class="xp-pill">+${m.xp} XP</span></div>
        <i class="ti ti-chevron-right" style="color:var(--text3)"></i>
      </div>
    </div>`).join('')}
  ${MISSIONS_DEF.filter(m=>doneKeys.has(m.key)).length>0?`
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 8px">완료한 미션</div>
    ${MISSIONS_DEF.filter(m=>doneKeys.has(m.key)).map(m=>`
      <div class="mission-item done">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:22px;width:32px;text-align:center">${m.icon}</div>
          <div style="flex:1"><div class="mi-title">${m.title}</div></div>
          <i class="ti ti-circle-check" style="color:var(--acc);font-size:18px"></i>
        </div>
      </div>`).join('')}`:''}`;
}

async function completeMission(key, xp) {
  if (!memberProfile) return;
  const { error } = await sb.from('mission_progress').upsert(
    { member_id: memberProfile.id, mission_key: key, is_done: true, done_at: new Date().toISOString() },
    { onConflict: 'member_id,mission_key' }
  );
  if (!error) {
    const newXp = (memberProfile.xp||0) + xp;
    await sb.from('members').update({ xp: newXp }).eq('id', memberProfile.id);
    memberProfile.xp = newXp;
  }
  await loadMissions();
  showPage('m-missions');
}

function mHomework() {
  const shared = sessionList.filter(s=>s.is_shared&&s.homework);
  return `
  <div class="card">
    ${shared.length===0
      ? `<div class="empty-state"><i class="ti ti-checklist"></i><p>아직 숙제가 없어요<br>트레이너가 수업 후 공유해줄 거예요!</p></div>`
      : `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="sec-title" style="margin-bottom:0"><i class="ti ti-checklist"></i>최근 숙제</div>
          <span class="tag tag-acc">${shared[0].session_date}</span>
        </div>
        <div style="background:var(--acc-softer);border-radius:9px;padding:12px;font-size:13px;line-height:1.8;white-space:pre-line">${shared[0].homework}</div>
        <div style="margin-top:10px;padding:9px 10px;background:var(--acc-softer);border-radius:8px;font-size:11px;color:var(--acc-text);font-weight:500">✨ 숙제 완료 시 미션에서 XP 획득!</div>`}
  </div>
  ${shared[0]?.caution?`<div class="card"><div style="background:#FFF1F2;border-left:3px solid #F43F5E;border-radius:0 9px 9px 0;padding:10px 12px"><div style="font-size:10px;font-weight:700;color:#9F1239;margin-bottom:2px">⚠️ 주의사항</div><div style="font-size:13px;color:var(--text2)">${shared[0].caution}</div></div></div>`:''}`;
}

function mNotice() {
  return noticeList.length===0
    ? `<div class="card"><div class="empty-state"><i class="ti ti-speakerphone"></i><p>아직 공지가 없어요</p></div></div>`
    : noticeList.map(n=>`
      <div class="notice-card ${n.is_pinned?'notice-pin':''}">
        ${n.is_pinned?`<div style="font-size:9px;color:#92400E;font-weight:700;margin-bottom:2px">📌 고정</div>`:''}
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${n.title}</div>
        <div style="font-size:13px;color:var(--text2)">${n.body}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:5px">${new Date(n.created_at).toLocaleDateString('ko-KR')}</div>
      </div>`).join('');
}

function mSettings() {
  return `
  <div class="card">
    <div class="sec-title"><i class="ti ti-palette"></i>테마 색상</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:14px">내 취향에 맞게 앱 색상을 바꿔보세요!</p>
    <div class="swatch-grid">
      ${themes.map(t=>`
        <div class="swatch-item ${t.id===curTheme?'active':''}" onclick="changeTheme('${t.id}')">
          <div class="swatch-circle" style="background:${t.color}"></div>
          <div class="swatch-name">${t.name}</div>
        </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="sec-title"><i class="ti ti-user"></i>내 정보</div>
    <div style="display:flex;align-items:center;gap:12px;padding:4px 0">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--acc-soft);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--acc-text)">${userProfile?.name?.charAt(0)||'?'}</div>
      <div>
        <div style="font-size:15px;font-weight:700">${userProfile?.name||''}</div>
        <div style="font-size:12px;color:var(--text3)">${memberProfile?.goal||''} · ${memberProfile?.current_week||1}주차</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">${currentUser?.email||''}</div>
      </div>
    </div>
    <button class="btn btn-danger btn-full" style="margin-top:12px" onclick="doLogout()"><i class="ti ti-logout"></i>로그아웃</button>
  </div>`;
}

// ── 기타 ──
function addEx() {
  const list = document.getElementById('ex-list');
  if (!list) return;
  const names = ['런지','힙 쓰러스트','케이블 로우','숄더프레스','덤벨 컬','플랭크'];
  const row = document.createElement('div');
  row.className = 'ex-row';
  row.innerHTML = `<span contenteditable="true">${names[Math.floor(Math.random()*names.length)]}</span><span contenteditable="true">-- · -- 회 · -- 세트</span><i class="ti ti-trash" style="font-size:13px;color:var(--text3);cursor:pointer;margin-left:6px" onclick="this.closest('.ex-row').remove()"></i>`;
  list.appendChild(row);
}

function drawChart(id) {
  const cid = id==='m-inbody' ? 'member-inbody-chart' : 'inbody-chart';
  const canvas = document.getElementById(cid);
  if (!canvas || inbodyList.length===0) return;
  if (chartInst) { chartInst.destroy(); chartInst=null; }
  const sorted = [...inbodyList].reverse().slice(-6);
  chartInst = new Chart(canvas, {
    type:'line',
    data:{
      labels: sorted.map(r=>r.measured_at),
      datasets:[
        {label:'체지방률(%)', data:sorted.map(r=>r.body_fat_pct), borderColor:'#F43F5E', backgroundColor:'rgba(244,63,94,0.06)', borderWidth:2, tension:.4, pointRadius:3, pointBackgroundColor:'#F43F5E', yAxisID:'y'},
        {label:'골격근량(kg)',data:sorted.map(r=>r.muscle_mass),  borderColor:'#0EA5E9', backgroundColor:'rgba(14,165,233,0.06)',  borderWidth:2, tension:.4, pointRadius:3, pointBackgroundColor:'#0EA5E9', yAxisID:'y1'},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{size:10},color:'#94A3B8',boxWidth:10}}},
      scales:{
        x:{grid:{color:'rgba(148,163,184,0.1)'},ticks:{font:{size:10},color:'#94A3B8'}},
        y:{position:'left', grid:{color:'rgba(148,163,184,0.08)'}, ticks:{font:{size:9},color:'#F43F5E'}},
        y1:{position:'right',grid:{drawOnChartArea:false},         ticks:{font:{size:9},color:'#0EA5E9'}}
      }
    }
  });
}

// ── 시작 ──
initAuth();
</script>
